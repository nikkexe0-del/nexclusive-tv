<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExclusiveTV</title>
    <meta name="description" content="Premium live television streaming." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Inter — Stripe's open-source substitute for Sohne -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: #f6f9fc; }
      /* Stripe-style thin scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #a8c3de; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748d; }
      /* Global ss01 */
      html { font-feature-settings: "ss01"; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
